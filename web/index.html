<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFiQuack</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>
            <span class="duck-icon">🐤</span>
            WiFiQuack
        </h1>
        <p class="subtitle">Write your DuckyScript payload below and click <strong>Run</strong>.</p>

        <form id="duckyForm">
            <div class="editor-wrapper">
                <textarea id="payload" placeholder="GUI r&#10;DELAY 500&#10;STRING cmd&#10;ENTER"></textarea>
                <button type="button" class="copy-btn" id="copyBtn" aria-label="Copier le script">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>
            <br>
            <div class="button-group">
                <button type="submit" id="runBtn" title="Ctrl + Enter" class="button-success">Run</button>
                <button type="button" title="Ctrl + s" id="download">Download</button>
                <button type="button" id="upload">Upload</button>
                <a href="/settings.html" class="btn-link">
                    <button type="button">Settings</button>
                </a>
            </div>
        </form>

    <div id="status"></div>

    <script type="module" src="main.js"></script>
    <script type="module" src="editor.js"></script>
</body>
</html>
